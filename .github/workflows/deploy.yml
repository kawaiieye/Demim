name: Deploy OSINT Timeline to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Temporarily move API routes (static export incompatible)
        run: |
          mkdir -p /tmp/api-routes-backup
          cp -r src/app/api /tmp/api-routes-backup/
          find src/app/api -name "route.ts" -delete
          find src/app/api -name "route.js" -delete

      - name: Build with Next.js (static export)
        run: npx next build
        env:
          NEXT_STATIC_EXPORT: "true"

      - name: Restore API routes
        if: always()
        run: |
          if [ -d /tmp/api-routes-backup/api ]; then
            rm -rf src/app/api
            cp -r /tmp/api-routes-backup/api src/app/api
          fi

      - name: Add .nojekyll file
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
